<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | AI Interview Copilot</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="auth-section">

        <div class="auth-card">

            <h1>Create Account</h1>

            <p>
                Join AI Interview Copilot and start analyzing resumes.
            </p>

            <form id="signupForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button
                    type="submit"
                    class="primary-btn"
                >
                    Sign Up
                </button>

            </form>

            <p class="auth-link">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </div>

    </section>

    <script src="signup.js"></script>

</body>
</html>
