<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Interview Copilot</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">

        <div class="logo">
            AI Interview Copilot
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>

        </ul>

    </nav>

    <section class="analyze-section">

        <div class="container">

            <div class="section-header">

                <h2>Login</h2>

                <p>
                    Sign in to access your dashboard and previous analyses.
                </p>

            </div>

            <div
                class="upload-card"
                style="max-width:500px;margin:auto;"
            >

                <h3>Welcome Back 👋</h3>

                <br>

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                >

                <br><br>

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                >

                <br><br>

                <button
                    id="loginBtn"
                    class="primary-btn"
                    style="width:100%;"
                >
                    Login
                </button>

                <br><br>

                <p style="text-align:center;">

                    Don't have an account?

                    <a href="signup.html">

                        Sign Up

                    </a>

                </p>

            </div>

        </div>

    </section>

    <script src="login.js"></script>

</body>
</html>
